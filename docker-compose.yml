services:
  api:
    build: .
    ports:
      - "80:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: oz
    ports:
      - "33065:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
