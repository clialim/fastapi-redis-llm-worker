services:
  api:
    build: ./api
    ports:
      - "80:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./api:/app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: oz
    ports:
      - "33065:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  worker:
    build: ./worker
    depends_on:
      - redis
    restart: always
  redis:
    image: redis:8
volumes:
  db_data:
